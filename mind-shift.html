<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>MIND-SHIFT — Cognitive Protocol</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --obsidian: #0F1117;
    --panel: #161922;
    --panel-raised: #1B1F2B;
    --hairline: #262B38;
    --sage: #B2AC88;
    --sage-dim: #7E795F;
    --lilac: #E6E6FA;
    --lilac-dim: #9B9BB5;
    --risk: #C4685D;
    --risk-dim: #6B3D38;
  }

  *{ box-sizing: border-box; }
  html,body{ background: var(--obsidian); margin:0; padding:0; }
  #root{ min-height:100vh; }

  body{
    font-family: 'Inter', sans-serif;
    color: var(--lilac);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  .font-display{ font-family: 'Space Grotesk', sans-serif; }
  .font-mono{ font-family: 'IBM Plex Mono', monospace; }

  .tnum{ font-feature-settings: "tnum"; font-variant-numeric: tabular-nums; }

  ::-webkit-scrollbar{ width:0px; height:0px; }

  @keyframes sweep{
    from{ transform: rotate(0deg); }
    to{ transform: rotate(360deg); }
  }
  .radar-sweep{
    animation: sweep 4s linear infinite;
    transform-origin: center;
  }

  @keyframes blipPulse{
    0%,100%{ opacity:0.35; r:4; }
    50%{ opacity:1; r:7; }
  }
  .blip-pulse{ animation: blipPulse 1.8s ease-in-out infinite; }

  @keyframes targetIn{
    from{ transform: scale(0); opacity:0; }
    to{ transform: scale(1); opacity:1; }
  }
  @keyframes targetSquish{
    0%{ transform: scale(1); opacity:1; }
    50%{ transform: scale(1.35); opacity:0.6; }
    100%{ transform: scale(0); opacity:0; }
  }
  .target-spawn{ animation: targetIn 0.18s ease-out; }
  .target-squish{ animation: targetSquish 0.22s ease-in forwards; }

  @keyframes fadeUp{
    from{ opacity:0; transform: translateY(6px); }
    to{ opacity:1; transform: translateY(0); }
  }
  .fade-up{ animation: fadeUp 0.35s ease-out; }

  @keyframes barGrow{
    from{ width:0%; }
  }
  .bar-grow{ animation: barGrow 1.1s cubic-bezier(0.16,1,0.3,1); }

  @media (prefers-reduced-motion: reduce){
    .radar-sweep, .blip-pulse, .target-spawn, .target-squish, .fade-up, .bar-grow{
      animation: none !important;
    }
  }

  .focus-ring:focus-visible{
    outline: 2px solid var(--sage);
    outline-offset: 2px;
  }

  .grain-overlay{
    background-image: radial-gradient(circle at 1px 1px, rgba(230,230,250,0.04) 1px, transparent 0);
    background-size: 14px 14px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react,env">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ============================================================
   ICONS — clean inline SVG, single stroke weight, no emojis
   ============================================================ */
const Icon = ({ name, size = 20, className = "" }) => {
  const common = {
    width: size, height: size, viewBox: "0 0 24 24",
    fill: "none", stroke: "currentColor", strokeWidth: 1.6,
    strokeLinecap: "round", strokeLinejoin: "round",
    className
  };
  switch (name) {
    case "dashboard":
      return <svg {...common}><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>;
    case "protocol":
      return <svg {...common}><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="0.5" fill="currentColor"/></svg>;
    case "monitor":
      return <svg {...common}><path d="M3 11a9 9 0 0 1 18 0"/><path d="M5 11a7 7 0 0 1 14 0"/><circle cx="12" cy="17" r="1.4" fill="currentColor" stroke="none"/><path d="M12 11v3"/></svg>;
    case "flame":
      return <svg {...common}><path d="M12 2c1 3-3 4-3 8a4 4 0 0 0 8 0c0-1.5-1-2.5-1-2.5.5 2-1 3-2 3a2 2 0 0 1-2-2c0-2 2-3 2-6.5z"/></svg>;
    case "brain":
      return <svg {...common}><path d="M9 4a3 3 0 0 0-3 3 3 3 0 0 0-2 5 3 3 0 0 0 2 5h2"/><path d="M15 4a3 3 0 0 1 3 3 3 3 0 0 1 2 5 3 3 0 0 1-2 5h-2"/><path d="M9 4v15"/><path d="M15 4v15"/></svg>;
    case "spark":
      return <svg {...common}><path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M18.4 5.6l-2.8 2.8M8.4 15.6l-2.8 2.8"/></svg>;
    case "cp":
      return <svg {...common}><polygon points="12 2 19 6 19 14 12 18 5 14 5 6"/><polygon points="12 7 15.5 9 15.5 13 12 15 8.5 13 8.5 9"/></svg>;
    case "back":
      return <svg {...common}><path d="M15 5l-7 7 7 7"/></svg>;
    case "timer":
      return <svg {...common}><circle cx="12" cy="13" r="8"/><path d="M12 9v4l3 2"/><path d="M9 2h6"/></svg>;
    case "target-hex":
      return <svg viewBox="0 0 40 40" width="100%" height="100%" fill="none" stroke="currentColor" strokeWidth="1.8" className={className}>
        <polygon points="20,3 34,11.5 34,28.5 20,37 6,28.5 6,11.5" />
        <polygon points="20,11 27,15.5 27,24.5 20,29 13,24.5 13,15.5" />
        <circle cx="20" cy="20" r="2.4" fill="currentColor" stroke="none"/>
      </svg>;
    case "check":
      return <svg {...common}><path d="M4 12l5 5L20 6"/></svg>;
    case "alert":
      return <svg {...common}><path d="M12 3l9 17H3z"/><path d="M12 10v4"/><circle cx="12" cy="17.2" r="0.4" fill="currentColor"/></svg>;
    case "shield":
      return <svg {...common}><path d="M12 3l8 3v6c0 5-3.5 7.8-8 9-4.5-1.2-8-4-8-9V6z"/><path d="M9 12l2.2 2.2L15.5 9.5"/></svg>;
    case "rotate":
      return <svg {...common}><path d="M3 12a9 9 0 1 1 3 6.7"/><path d="M3 21v-6h6"/></svg>;
    case "pin":
      return <svg {...common}><path d="M12 21s7-7.2 7-12a7 7 0 1 0-14 0c0 4.8 7 12 7 12z"/><circle cx="12" cy="9" r="2.4"/></svg>;
    case "list":
      return <svg {...common}><path d="M9 6h12M9 12h12M9 18h12"/><circle cx="4.5" cy="6" r="1" fill="currentColor"/><circle cx="4.5" cy="12" r="1" fill="currentColor"/><circle cx="4.5" cy="18" r="1" fill="currentColor"/></svg>;
    case "close":
      return <svg {...common}><path d="M5 5l14 14M19 5L5 19"/></svg>;
    case "trend":
      return <svg {...common}><path d="M3 17l5-5 4 4 8-9"/><path d="M16 6h4v4"/></svg>;
    default:
      return null;
  }
};

/* ============================================================
   STATIC DATA
   ============================================================ */
const CBT_TIPS = [
  "Deep breathing for 60 seconds resets your craving cycle.",
  "Cravings peak in 3-5 minutes, then fall — they don't escalate forever.",
  "Drink cold water. The sensory shift interrupts the urge pathway.",
  "Name the urge out loud: 'This is a craving, not an emergency.'",
  "Urges are classically conditioned to routine — break the pattern, not your will.",
  "Step outside for two minutes. A change in environment lowers cue strength.",
  "Your prefrontal cortex regains control roughly 90 seconds after the urge spikes.",
  "Delay, don't deny. Tell yourself 'not yet' instead of 'never'.",
  "Clench and release your fists for 10 seconds — physical reset, mental reset.",
  "Every bypassed craving weakens the neural loop a little more.",
];

const RECOVERY_CHECKLIST = [
  "Acknowledge the lapse without self-punishment — shame increases relapse risk.",
  "Identify the trigger that preceded it (location, emotion, social cue).",
  "Hydrate and reset breathing for 90 seconds before doing anything else.",
  "Log the trigger in your pattern history for future geofencing accuracy.",
  "Recommit to the next 24 hours only — not the whole streak at once.",
];

/* ============================================================
   ROOT APP
   ============================================================ */
function App() {
  const [activeTab, setActiveTab] = useState("dashboard");
  const [cp, setCp] = useState(1240);
  const [cpFlash, setCpFlash] = useState(false);
  const [streak, setStreak] = useState(5);
  const [recovery, setRecovery] = useState(68);
  const [tipIndex, setTipIndex] = useState(0);
  const [toast, setToast] = useState(null);

  const addCp = useCallback((amount) => {
    setCp(prev => prev + amount);
    setCpFlash(true);
    setTimeout(() => setCpFlash(false), 700);
  }, []);

  const showToast = useCallback((message, tone = "sage") => {
    setToast({ message, tone, id: Date.now() });
  }, []);

  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(null), 3200);
    return () => clearTimeout(t);
  }, [toast]);

  useEffect(() => {
    const interval = setInterval(() => {
      setTipIndex(prev => (prev + 1) % CBT_TIPS.length);
    }, 9000);
    return () => clearInterval(interval);
  }, []);

  return (
    <div className="min-h-screen flex flex-col" style={{ background: "var(--obsidian)" }}>
      <Header cp={cp} cpFlash={cpFlash} />

      <main className="flex-1 overflow-y-auto px-4 pt-4 pb-28 max-w-md w-full mx-auto">
        {activeTab === "dashboard" && (
          <Dashboard
            streak={streak}
            recovery={recovery}
            tipIndex={tipIndex}
            setTipIndex={setTipIndex}
          />
        )}
        {activeTab === "protocol" && (
          <Protocol addCp={addCp} showToast={showToast} />
        )}
        {activeTab === "monitor" && (
          <Monitor addCp={addCp} showToast={showToast} />
        )}
      </main>

      <Toast toast={toast} />
      <BottomNav active={activeTab} setActive={setActiveTab} />
    </div>
  );
}

/* ============================================================
   HEADER
   ============================================================ */
function Header({ cp, cpFlash }) {
  return (
    <header className="sticky top-0 z-30 border-b" style={{ background: "rgba(15,17,23,0.92)", borderColor: "var(--hairline)", backdropFilter: "blur(6px)" }}>
      <div className="max-w-md w-full mx-auto px-4 py-3.5 flex items-center justify-between">
        <div className="flex items-baseline gap-2">
          <span className="font-display font-700 text-[15px] tracking-[0.18em]" style={{ color: "var(--lilac)" }}>MIND</span>
          <span className="font-display font-700 text-[15px] tracking-[0.18em]" style={{ color: "var(--sage)" }}>—SHIFT</span>
        </div>
        <div
          className="flex items-center gap-1.5 px-3 py-1.5 rounded-sm border transition-colors duration-300"
          style={{
            borderColor: cpFlash ? "var(--sage)" : "var(--hairline)",
            background: cpFlash ? "rgba(178,172,136,0.10)" : "var(--panel)"
          }}
        >
          <Icon name="cp" size={14} className="shrink-0" style={{ color: "var(--sage)" }} />
          <span className="font-mono tnum text-[13px] font-500" style={{ color: "var(--sage)" }}>
            {cp.toLocaleString()}
          </span>
          <span className="font-mono text-[10px] tracking-wider" style={{ color: "var(--sage-dim)" }}>CP</span>
        </div>
      </div>
    </header>
  );
}

/* ============================================================
   SECTION LABEL — bracket-style instrument-panel header
   ============================================================ */
function SectionLabel({ children }) {
  return (
    <div className="flex items-center gap-2 mb-3">
      <span className="font-mono text-[11px] tracking-[0.22em]" style={{ color: "var(--sage-dim)" }}>
        [ {children} ]
      </span>
      <div className="flex-1 h-px" style={{ background: "var(--hairline)" }} />
    </div>
  );
}

/* ============================================================
   DASHBOARD
   ============================================================ */
function Dashboard({ streak, recovery, tipIndex, setTipIndex }) {
  return (
    <div className="space-y-6 fade-up">
      <div>
        <p className="font-mono text-[11px] tracking-[0.2em]" style={{ color: "var(--lilac-dim)" }}>STATUS REPORT</p>
        <h1 className="font-display text-[22px] font-600 mt-0.5" style={{ color: "var(--lilac)" }}>Neuropsychological Tracker</h1>
      </div>

      {/* Streak Ledger */}
      <div className="rounded-md border p-5" style={{ background: "var(--panel)", borderColor: "var(--hairline)" }}>
        <SectionLabel>VAPE-FREE STREAK LEDGER</SectionLabel>
        <div className="flex items-end justify-between">
          <div className="flex items-baseline gap-2">
            <span className="font-display tnum text-[52px] leading-none font-700" style={{ color: "var(--sage)" }}>{streak}</span>
            <span className="font-mono text-[13px] tracking-wide pb-1" style={{ color: "var(--lilac-dim)" }}>DAYS</span>
          </div>
          <Icon name="flame" size={30} style={{ color: "var(--sage)" }} />
        </div>
        <div className="flex gap-1.5 mt-4">
          {Array.from({ length: 7 }).map((_, i) => (
            <div
              key={i}
              className="h-1.5 flex-1 rounded-full"
              style={{ background: i < streak ? "var(--sage)" : "var(--hairline)" }}
            />
          ))}
        </div>
        <p className="font-mono text-[10px] mt-2 tracking-wide" style={{ color: "var(--lilac-dim)" }}>
          DAY 1 — DAY 7 ROLLING WINDOW
        </p>
      </div>

      {/* Dopamine Recovery */}
      <div className="rounded-md border p-5" style={{ background: "var(--panel)", borderColor: "var(--hairline)" }}>
        <SectionLabel>DOPAMINE RECEPTOR RECOVERY</SectionLabel>
        <div className="flex items-center justify-between mb-3">
          <div className="flex items-center gap-2">
            <Icon name="brain" size={18} style={{ color: "var(--sage)" }} />
            <span className="text-[13px] font-500" style={{ color: "var(--lilac)" }}>Receptor sensitivity baseline</span>
          </div>
          <span className="font-mono tnum text-[15px] font-600" style={{ color: "var(--sage)" }}>{recovery}%</span>
        </div>
        <div className="h-2.5 w-full rounded-full overflow-hidden" style={{ background: "var(--hairline)" }}>
          <div
            className="h-full rounded-full bar-grow"
            style={{ width: `${recovery}%`, background: "linear-gradient(90deg, var(--sage-dim), var(--sage))" }}
          />
        </div>
        <p className="text-[11px] mt-3 leading-relaxed" style={{ color: "var(--lilac-dim)" }}>
          Nicotinic receptor density normalizes gradually after cessation. Current trajectory estimates full baseline restoration within 6–8 weeks.
        </p>
      </div>

      {/* CBT Tips Engine */}
      <div className="rounded-md border p-5" style={{ background: "var(--panel-raised)", borderColor: "var(--hairline)" }}>
        <div className="flex items-center justify-between mb-3">
          <span className="font-mono text-[11px] tracking-[0.22em]" style={{ color: "var(--lilac-dim)" }}>[ CBT NUDGE ENGINE ]</span>
          <button
            onClick={() => setTipIndex((tipIndex + 1) % CBT_TIPS.length)}
            className="focus-ring p-1.5 rounded-sm transition-opacity hover:opacity-70"
            aria-label="Next CBT tip"
            style={{ color: "var(--sage)" }}
          >
            <Icon name="spark" size={16} />
          </button>
        </div>
        <p key={tipIndex} className="text-[15px] leading-relaxed font-500 fade-up" style={{ color: "var(--lilac)" }}>
          {CBT_TIPS[tipIndex]}
        </p>
      </div>
    </div>
  );
}

/* ============================================================
   PROTOCOL — ABM "TARGET SQUISH" GAME
   ============================================================ */
const GAME_DURATION = 30;
const TARGET_LIFETIME = 1500;
const comboMultiplier = (combo) => (combo >= 8 ? 3 : combo >= 4 ? 2 : 1);

function Protocol({ addCp, showToast }) {
  const [gameState, setGameState] = useState("idle"); // idle | running | over
  const [timeLeft, setTimeLeft] = useState(GAME_DURATION);
  const [score, setScore] = useState(0);
  const [combo, setCombo] = useState(0);
  const [bestCombo, setBestCombo] = useState(0);
  const [targets, setTargets] = useState([]);
  const [earnedCp, setEarnedCp] = useState(0);

  const containerRef = useRef(null);
  const spawnTimeoutRef = useRef(null);
  const tickRef = useRef(null);
  const comboDecayRef = useRef(null);
  const targetIdRef = useRef(0);

  const clearAllTimers = () => {
    clearTimeout(spawnTimeoutRef.current);
    clearInterval(tickRef.current);
    clearTimeout(comboDecayRef.current);
  };

  useEffect(() => () => clearAllTimers(), []);

  const spawnTarget = useCallback(() => {
    if (!containerRef.current) return;
    const rect = containerRef.current.getBoundingClientRect();
    const size = 56;
    const x = Math.random() * Math.max(rect.width - size, 10);
    const y = Math.random() * Math.max(rect.height - size, 10);
    const id = targetIdRef.current++;

    setTargets(prev => [...prev, { id, x, y, dying: false }]);

    const lifeTimer = setTimeout(() => {
      setTargets(prev => prev.map(t => t.id === id ? { ...t, dying: true } : t));
      setTimeout(() => {
        setTargets(prev => prev.filter(t => t.id !== id));
      }, 220);
      // missed target -> reset combo
      setCombo(0);
    }, TARGET_LIFETIME);

    return lifeTimer;
  }, []);

  useEffect(() => {
    if (gameState !== "running") return;

    let lifeTimers = [];
    const scheduleSpawn = () => {
      const delay = 450 + Math.random() * 500;
      spawnTimeoutRef.current = setTimeout(() => {
        const lt = spawnTarget();
        lifeTimers.push(lt);
        scheduleSpawn();
      }, delay);
    };
    scheduleSpawn();

    tickRef.current = setInterval(() => {
      setTimeLeft(prev => {
        if (prev <= 1) {
          return 0;
        }
        return prev - 1;
      });
    }, 1000);

    return () => {
      clearTimeout(spawnTimeoutRef.current);
      clearInterval(tickRef.current);
      lifeTimers.forEach(clearTimeout);
    };
  }, [gameState, spawnTarget]);

  useEffect(() => {
    if (gameState === "running" && timeLeft === 0) {
      const finalCp = score * 2;
      setEarnedCp(finalCp);
      setGameState("over");
      setTargets([]);
      addCp(finalCp);
      showToast(`Craving bypassed. +${finalCp} CP secured.`, "sage");
    }
  }, [timeLeft, gameState, score, addCp, showToast]);

  const startGame = () => {
    setScore(0);
    setCombo(0);
    setBestCombo(0);
    setTimeLeft(GAME_DURATION);
    setTargets([]);
    setEarnedCp(0);
    setGameState("running");
  };

  const handleSquish = (id) => {
    setTargets(prev => prev.map(t => t.id === id ? { ...t, dying: true } : t));
    setTimeout(() => {
      setTargets(prev => prev.filter(t => t.id !== id));
    }, 200);

    setCombo(prevCombo => {
      const nextCombo = prevCombo + 1;
      setBestCombo(b => Math.max(b, nextCombo));
      const multiplier = comboMultiplier(nextCombo);
      setScore(prevScore => prevScore + multiplier);

      clearTimeout(comboDecayRef.current);
      comboDecayRef.current = setTimeout(() => setCombo(0), 2200);

      return nextCombo;
    });
  };

  const multiplier = comboMultiplier(combo);

  return (
    <div className="space-y-5 fade-up">
      <div>
        <p className="font-mono text-[11px] tracking-[0.2em]" style={{ color: "var(--lilac-dim)" }}>ABM PROTOCOL</p>
        <h1 className="font-display text-[22px] font-600 mt-0.5" style={{ color: "var(--lilac)" }}>Attentional Bias Modification</h1>
        <p className="text-[12.5px] mt-1.5 leading-relaxed" style={{ color: "var(--lilac-dim)" }}>
          Engage this protocol the moment a craving spikes. Redirecting attentional focus for 30 seconds interrupts the urge-to-action pathway.
        </p>
      </div>

      {gameState === "idle" && (
        <div className="rounded-md border p-6 flex flex-col items-center text-center gap-4" style={{ background: "var(--panel)", borderColor: "var(--hairline)" }}>
          <Icon name="protocol" size={40} style={{ color: "var(--sage)" }} />
          <div>
            <h2 className="font-display text-[16px] font-600" style={{ color: "var(--lilac)" }}>Target Squish</h2>
            <p className="text-[12.5px] mt-1" style={{ color: "var(--lilac-dim)" }}>30-second reflex protocol. Squish targets before they decay. Build combos for higher CP multipliers.</p>
          </div>
          <button
            onClick={startGame}
            className="focus-ring w-full py-3 rounded-sm font-display font-600 text-[13px] tracking-[0.1em] transition-transform active:scale-[0.98]"
            style={{ background: "var(--sage)", color: "var(--obsidian)" }}
          >
            BEGIN PROTOCOL
          </button>
        </div>
      )}

      {gameState === "running" && (
        <div className="space-y-3">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2">
              <Icon name="timer" size={16} style={{ color: "var(--sage)" }} />
              <span className="font-mono tnum text-[18px] font-600" style={{ color: timeLeft <= 5 ? "var(--risk)" : "var(--lilac)" }}>
                00:{String(timeLeft).padStart(2, "0")}
              </span>
            </div>
            <div className="flex items-center gap-4">
              <div className="text-right">
                <p className="font-mono text-[9px] tracking-wider" style={{ color: "var(--lilac-dim)" }}>SCORE</p>
                <p className="font-mono tnum text-[16px] font-600" style={{ color: "var(--sage)" }}>{score}</p>
              </div>
              <div className="text-right min-w-[44px]">
                <p className="font-mono text-[9px] tracking-wider" style={{ color: "var(--lilac-dim)" }}>COMBO</p>
                <p className="font-mono tnum text-[16px] font-600" style={{ color: combo > 0 ? "var(--lilac)" : "var(--lilac-dim)" }}>
                  x{multiplier}
                </p>
              </div>
            </div>
          </div>

          <div className="h-1 w-full rounded-full overflow-hidden" style={{ background: "var(--hairline)" }}>
            <div
              className="h-full transition-all duration-1000 ease-linear"
              style={{ width: `${(timeLeft / GAME_DURATION) * 100}%`, background: "var(--sage)" }}
            />
          </div>

          <div
            ref={containerRef}
            className="relative w-full rounded-md border overflow-hidden select-none"
            style={{ height: "360px", background: "var(--panel)", borderColor: "var(--hairline)", touchAction: "manipulation" }}
          >
            <div className="absolute inset-0 grain-overlay opacity-40" />
            {targets.map(t => (
              <button
                key={t.id}
                onClick={() => handleSquish(t.id)}
                aria-label="Target"
                className={`focus-ring absolute rounded-md ${t.dying ? "target-squish" : "target-spawn"}`}
                style={{
                  left: t.x, top: t.y, width: 56, height: 56,
                  color: "var(--sage)",
                  filter: "drop-shadow(0 0 6px rgba(178,172,136,0.35))"
                }}
              >
                <Icon name="target-hex" />
              </button>
            ))}
            {targets.length === 0 && (
              <div className="absolute inset-0 flex items-center justify-center">
                <span className="font-mono text-[11px] tracking-widest" style={{ color: "var(--lilac-dim)" }}>SCANNING...</span>
              </div>
            )}
          </div>
        </div>
      )}

      {gameState === "over" && (
        <div className="rounded-md border p-6 flex flex-col items-center text-center gap-4 fade-up" style={{ background: "var(--panel)", borderColor: "var(--hairline)" }}>
          <div className="w-14 h-14 rounded-full flex items-center justify-center" style={{ background: "rgba(178,172,136,0.12)" }}>
            <Icon name="check" size={26} style={{ color: "var(--sage)" }} />
          </div>
          <div>
            <h2 className="font-display text-[17px] font-600" style={{ color: "var(--lilac)" }}>Craving Successfully Bypassed</h2>
            <p className="text-[12.5px] mt-1.5 leading-relaxed" style={{ color: "var(--lilac-dim)" }}>
              Attentional redirection complete. The urge window has closed without action taken.
            </p>
          </div>

          <div className="grid grid-cols-3 gap-2 w-full">
            <Stat label="SCORE" value={score} />
            <Stat label="BEST COMBO" value={`x${comboMultiplier(bestCombo)}`} />
            <Stat label="CP EARNED" value={`+${earnedCp}`} accent />
          </div>

          <button
            onClick={startGame}
            className="focus-ring w-full py-3 rounded-sm font-display font-600 text-[13px] tracking-[0.1em] border transition-colors"
            style={{ borderColor: "var(--sage)", color: "var(--sage)" }}
          >
            RUN AGAIN
          </button>
        </div>
      )}
    </div>
  );
}

function Stat({ label, value, accent }) {
  return (
    <div className="rounded-sm border py-3 px-2" style={{ background: "var(--panel-raised)", borderColor: "var(--hairline)" }}>
      <p className="font-mono text-[9px] tracking-wider" style={{ color: "var(--lilac-dim)" }}>{label}</p>
      <p className="font-mono tnum text-[16px] font-600 mt-1" style={{ color: accent ? "var(--sage)" : "var(--lilac)" }}>{value}</p>
    </div>
  );
}

/* ============================================================
   MONITOR — JITAI GEOFENCING SIMULATION
   ============================================================ */
function Monitor({ addCp, showToast }) {
  const [decision, setDecision] = useState(null); // null | "survived" | "relapsed"
  const [checklist, setChecklist] = useState(RECOVERY_CHECKLIST.map(() => false));

  const handleSurvive = () => {
    setDecision("survived");
    addCp(50);
    showToast("Locus of control reinforced. +50 CP secured.", "sage");
  };

  const handleRelapse = () => {
    setDecision("relapsed");
    setChecklist(RECOVERY_CHECKLIST.map(() => false));
  };

  const toggleChecklist = (i) => {
    setChecklist(prev => prev.map((v, idx) => idx === i ? !v : v));
  };

  const reset = () => setDecision(null);

  return (
    <div className="space-y-5 fade-up">
      <div>
        <p className="font-mono text-[11px] tracking-[0.2em]" style={{ color: "var(--lilac-dim)" }}>JITAI ALERT</p>
        <h1 className="font-display text-[22px] font-600 mt-0.5" style={{ color: "var(--lilac)" }}>Geofencing Monitor</h1>
      </div>

      {/* Radar */}
      <div className="rounded-md border p-5" style={{ background: "var(--panel)", borderColor: "var(--hairline)" }}>
        <SectionLabel>PROXIMITY SCAN</SectionLabel>

        <div className="relative w-full aspect-square max-w-[260px] mx-auto">
          <svg viewBox="0 0 200 200" className="w-full h-full">
            <defs>
              <radialGradient id="radarFade" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stopColor="var(--sage)" stopOpacity="0.22" />
                <stop offset="100%" stopColor="var(--sage)" stopOpacity="0" />
              </radialGradient>
            </defs>
            {[90, 65, 40, 15].map(r => (
              <circle key={r} cx="100" cy="100" r={r} fill="none" stroke="var(--hairline)" strokeWidth="1" />
            ))}
            <line x1="10" y1="100" x2="190" y2="100" stroke="var(--hairline)" strokeWidth="1" />
            <line x1="100" y1="10" x2="100" y2="190" stroke="var(--hairline)" strokeWidth="1" />

            <g className="radar-sweep" style={{ transformOrigin: "100px 100px" }}>
              <path d="M100,100 L100,10 A90,90 0 0,1 163.6,36.4 Z" fill="url(#radarFade)" />
            </g>

            {/* center = user */}
            <circle cx="100" cy="100" r="3.5" fill="var(--lilac)" />
            <circle cx="100" cy="100" r="7" fill="none" stroke="var(--lilac)" strokeWidth="1" opacity="0.5" />

            {/* risk blip */}
            <circle cx="142" cy="64" r="4" fill="var(--risk)" className="blip-pulse" />
          </svg>

          <div className="absolute" style={{ left: "73%", top: "26%", transform: "translate(-50%, -120%)" }}>
            <div className="flex items-center gap-1 px-2 py-1 rounded-sm border whitespace-nowrap" style={{ background: "var(--panel-raised)", borderColor: "var(--risk-dim)" }}>
              <Icon name="pin" size={11} style={{ color: "var(--risk)" }} />
              <span className="font-mono text-[9px] tracking-wide" style={{ color: "var(--risk)" }}>VAPE STORE</span>
            </div>
          </div>
        </div>

        <div className="flex items-center justify-center gap-2 mt-4">
          <Icon name="alert" size={15} style={{ color: "var(--risk)" }} />
          <p className="font-mono text-[12px] tracking-wide" style={{ color: "var(--lilac)" }}>
            HIGH-RISK ZONE DETECTED — <span style={{ color: "var(--risk)" }}>120m</span>
          </p>
        </div>
      </div>

      {decision === null && (
        <div className="rounded-md border p-5 space-y-4" style={{ background: "var(--panel-raised)", borderColor: "var(--hairline)" }}>
          <SectionLabel>DECISION NODE</SectionLabel>
          <p className="text-[13px] leading-relaxed" style={{ color: "var(--lilac)" }}>
            You are approaching a known trigger location. The next ninety seconds determine the outcome — choose deliberately.
          </p>

          <button
            onClick={handleSurvive}
            className="focus-ring w-full flex items-center justify-center gap-2 py-3 rounded-sm font-display font-600 text-[13px] tracking-[0.08em] transition-transform active:scale-[0.98]"
            style={{ background: "var(--sage)", color: "var(--obsidian)" }}
          >
            <Icon name="shield" size={16} />
            TURN AROUND AND SURVIVE
          </button>

          <button
            onClick={handleRelapse}
            className="focus-ring w-full flex items-center justify-center gap-2 py-3 rounded-sm font-display font-600 text-[13px] tracking-[0.08em] border transition-colors"
            style={{ borderColor: "var(--hairline)", color: "var(--lilac-dim)" }}
          >
            <Icon name="rotate" size={16} />
            I RELAPSED
          </button>
        </div>
      )}

      {decision === "survived" && (
        <div className="rounded-md border p-6 flex flex-col items-center text-center gap-4 fade-up" style={{ background: "var(--panel)", borderColor: "var(--hairline)" }}>
          <div className="w-14 h-14 rounded-full flex items-center justify-center" style={{ background: "rgba(178,172,136,0.12)" }}>
            <Icon name="shield" size={26} style={{ color: "var(--sage)" }} />
          </div>
          <div>
            <h2 className="font-display text-[17px] font-600" style={{ color: "var(--lilac)" }}>Control Reinforced</h2>
            <p className="text-[12.5px] mt-1.5 leading-relaxed" style={{ color: "var(--lilac-dim)" }}>
              You exercised agency over the environment instead of letting it dictate behavior. That decision compounds — locus of control strengthens with every repetition.
            </p>
          </div>
          <div className="px-4 py-2 rounded-sm border" style={{ borderColor: "var(--sage)", background: "rgba(178,172,136,0.08)" }}>
            <span className="font-mono tnum text-[14px] font-600" style={{ color: "var(--sage)" }}>+50 CP</span>
          </div>
          <button onClick={reset} className="focus-ring text-[12px] font-mono tracking-wide underline" style={{ color: "var(--lilac-dim)" }}>
            RETURN TO MONITOR
          </button>
        </div>
      )}

      {decision === "relapsed" && (
        <div className="rounded-md border p-5 space-y-4 fade-up" style={{ background: "var(--panel)", borderColor: "var(--hairline)" }}>
          <div className="flex items-center gap-2">
            <Icon name="list" size={16} style={{ color: "var(--lilac)" }} />
            <h2 className="font-display text-[15px] font-600" style={{ color: "var(--lilac)" }}>Recovery Protocol</h2>
          </div>
          <p className="text-[12.5px] leading-relaxed" style={{ color: "var(--lilac-dim)" }}>
            A single lapse does not erase the progress already made. Work through this checklist to re-stabilize before continuing.
          </p>

          <div className="space-y-2">
            {RECOVERY_CHECKLIST.map((item, i) => (
              <button
                key={i}
                onClick={() => toggleChecklist(i)}
                className="focus-ring w-full flex items-start gap-3 p-3 rounded-sm border text-left transition-colors"
                style={{
                  borderColor: checklist[i] ? "var(--sage-dim)" : "var(--hairline)",
                  background: checklist[i] ? "rgba(178,172,136,0.07)" : "var(--panel-raised)"
                }}
              >
                <span
                  className="mt-0.5 w-4 h-4 rounded-sm border flex items-center justify-center shrink-0"
                  style={{ borderColor: checklist[i] ? "var(--sage)" : "var(--hairline)" }}
                >
                  {checklist[i] && <Icon name="check" size={11} style={{ color: "var(--sage)" }} />}
                </span>
                <span className="text-[12.5px] leading-snug" style={{ color: checklist[i] ? "var(--lilac-dim)" : "var(--lilac)" }}>
                  {item}
                </span>
              </button>
            ))}
          </div>

          <button
            onClick={reset}
            className="focus-ring w-full py-3 rounded-sm font-display font-600 text-[13px] tracking-[0.08em] border transition-colors"
            style={{ borderColor: "var(--sage)", color: "var(--sage)" }}
          >
            RESUME MONITORING
          </button>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   TOAST
   ============================================================ */
function Toast({ toast }) {
  if (!toast) return null;
  return (
    <div key={toast.id} className="fixed bottom-24 left-0 w-full px-4 z-40 fade-up pointer-events-none">
      <div
        className="max-w-md mx-auto flex items-center gap-2 px-4 py-3 rounded-sm border shadow-lg"
        style={{ background: "var(--panel-raised)", borderColor: "var(--sage-dim)" }}
      >
        <Icon name="trend" size={15} style={{ color: "var(--sage)" }} />
        <span className="text-[12.5px] font-500" style={{ color: "var(--lilac)" }}>{toast.message}</span>
      </div>
    </div>
  );
}

/* ============================================================
   BOTTOM NAV
   ============================================================ */
function BottomNav({ active, setActive }) {
  const items = [
    { id: "dashboard", label: "Dashboard", icon: "dashboard" },
    { id: "protocol", label: "Protocol", icon: "protocol" },
    { id: "monitor", label: "Monitor", icon: "monitor" },
  ];

  return (
    <nav
      className="fixed bottom-0 left-0 w-full border-t z-30"
      style={{ background: "rgba(15,17,23,0.96)", borderColor: "var(--hairline)", backdropFilter: "blur(6px)" }}
    >
      <div className="max-w-md mx-auto flex">
        {items.map(item => {
          const isActive = active === item.id;
          return (
            <button
              key={item.id}
              onClick={() => setActive(item.id)}
              className="focus-ring flex-1 flex flex-col items-center gap-1 py-3 transition-colors"
              aria-current={isActive}
            >
              <Icon
                name={item.icon}
                size={20}
                style={{ color: isActive ? "var(--sage)" : "var(--lilac-dim)" }}
              />
              <span
                className="font-mono text-[10px] tracking-wide"
                style={{ color: isActive ? "var(--sage)" : "var(--lilac-dim)" }}
              >
                {item.label.toUpperCase()}
              </span>
              <div
                className="absolute -top-px h-[2px] w-8 rounded-full transition-opacity"
                style={{ background: "var(--sage)", opacity: isActive ? 1 : 0 }}
              />
            </button>
          );
        })}
      </div>
    </nav>
  );
}

/* ============================================================
   MOUNT
   ============================================================ */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
